name: emulator-test

# End-to-end test of the app → daemon → stub-APK → Frida-agent cycle on a rooted
# arm64 AVD. Silent on success; fails the job on any harness assertion failure.
#
# Runs the harness in tools/emulator/. Requires the sibling repos
# (voboost-inject, voboost-script, voboost-stubs) checked out alongside this one.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  emulator-e2e:
    # Apple Silicon runner hosts an arm64 system image natively (faster than x86
    # emulation of arm64). Falls back to ubuntu if macos-14 is unavailable.
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Sibling repos required to assemble daemon + agents + stub targets.
      - name: Checkout sibling repos
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/voboost-inject
          path: ../voboost-inject
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/voboost-script
          path: ../voboost-script
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/voboost-stubs
          path: ../voboost-stubs

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK + arm64 API-28 system image
        uses: android-actions/setup-android@v3
        with:
          packages: |
            system-images;android-28;default;arm64-v8a
            platforms;android-28
            build-tools

      - name: Create AVD 'free'
        run: |
          echo "no" | avdmanager create avd -n free \
            -k "system-images;android-28;default;arm64-v8a" -d pixel || true

      - name: Build app APK
        run: ./gradlew build

      - name: Build arm64 daemon + signed manifest
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: |
          # NOTE: requires the Android NDK installed and a dev signing key.
          # CI must provision config/key-dev-{private,public}.pem (secret) for a
          # signed manifest; otherwise the dev fixture is used (see provision.sh).
          make -C ../voboost-inject key-dev
          make -C ../voboost-inject build-android
          make -C ../voboost-script build   # agents → build/*.js
          make -C ../voboost-inject release-manifest DIR=../voboost-script/build CHANNEL=agents VERSION=ci
          make -C ../voboost-inject sign KEY=config/key-dev-private.pem FILE=build/release-manifest.json

      - name: Build stub-APK targets
        run: ./gradlew -p ../voboost-stubs assemble
        continue-on-error: true   # stubs port may be partial; daemon-only scenarios still run

      - name: Boot, provision, test
        env:
          AVD_NAME: free
          EMULATOR_FLAGS: "-no-window -no-audio -gpu swiftshader_indirect"
        run: |
          tools/emulator/boot.sh
          tools/emulator/provision.sh --no-stubs || tools/emulator/provision.sh
          tools/emulator/run-test.sh --keep-logs

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-logs
          path: /tmp/**/device-logs/**
          if-no-files-found: ignore

  openspec-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate openspec changes
        run: npx --yes @fission-ai/openspec validate --all --strict
